query BlogPostIDs($limit: Int, $page: Int) {
  blogPostCollection(limit: $limit, skip: $page) {
    blogs: items {
      slug
    }
  }
}

query BlogPostCards($slugs: [String!]!) {
  blogPostCollection(where: { slug_in: $slugs }) {
    blogs: items {
      slug
      title
      publishDate
      description
      tagCollection {
        tags: items {
          slug
          name
        }
      }
    }
  }
}

query BlogPost($slug: String!) {
  blogPostCollection(where: { slug: $slug }) {
    blogs: items {
      title
      publishDate
      description
      body
      tagCollection {
        tags: items {
          slug
          name
        }
      }
    }
  }
}
